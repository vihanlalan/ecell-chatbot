<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Record: Ola Group Recovery Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<style>
/* ── STRICT BRUTALIST CORPORATE THEME ── */
:root {
  --black: #0a0a0a;
  --white: #ffffff;
  --indigo: #002ba8;
  --gray: #e5e5e5;
  --dark-gray: #555555;
  --red: #d11f1f;
  --green: #117b3d;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  background-color: var(--gray); 
  color: var(--black); 
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

#app {
  width: 100vw;
  height: 100vh;
  padding: 2rem;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
}

h1, h2, h3, h4 { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; }
button { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; cursor: pointer; }

/* ── DOCUMENT CONTAINER ── */
.document {
  background-color: var(--white);
  border: 1px solid var(--black);
  width: 100%;
  max-width: 960px;
  height: 100%;
  box-shadow: 12px 12px 0px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.t-border { border-top: 1px solid var(--black); }
.b-border { border-bottom: 1px solid var(--black); }
.r-border { border-right: 1px solid var(--black); }

/* ── MODAL ── */
.modal-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(229, 229, 229, 0.85);
  backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; animation: fadeInModal 0.2s forwards;
  padding: 1rem;
}
@keyframes fadeInModal { to { opacity: 1; } }

.modal-box {
  background: var(--white);
  border: 3px solid var(--black);
  max-width: 480px; width: 100%;
  padding: 32px;
  box-shadow: 12px 12px 0px rgba(0,0,0,1);
  transform: translateY(20px); 
  animation: dropIn 0.3s 0.1s cubic-bezier(0.17, 0.84, 0.44, 1) forwards; 
  opacity: 0;
}
@keyframes dropIn { to { opacity: 1; transform: translateY(0); } }

.modal-title { font-size: 22px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid var(--black); padding-bottom: 12px; margin-bottom: 20px; }
.modal-rules { font-size: 14px; line-height: 1.6; color: var(--black); }
.modal-rules ul { padding-left: 24px; margin: 16px 0 24px 0; }
.modal-rules li { margin-bottom: 10px; font-weight: 500; }
.modal-rules strong { color: var(--indigo); font-weight: 800; }
.btn-acknowledge { background: var(--black); color: var(--white); border: none; padding: 16px; font-size: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; width: 100%; transition: background 0.2s;}
.btn-acknowledge:hover { background: var(--indigo); color: var(--white); }

/* ── HEADER ── */
.doc-header { display: flex; align-items: stretch; background: var(--white); flex-shrink: 0; }
.seal { width: 80px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 600; color: var(--indigo); background: var(--white); }
.title-area { flex: 1; padding: 16px 24px; display: flex; flex-direction: column; justify-content: center; }
.title-main { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }
.title-sub { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dark-gray); margin-top: 4px; }
.meta-area { display: flex; flex-direction: column; min-width: 200px; }
.meta-row { flex: 1; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-family: 'Courier Prime', monospace; font-size: 12px; font-weight: 700; }
.meta-row.warning { color: var(--red); }

/* ── PROGRESS BAR ── */
.meter-container { padding: 16px; background: #f9f9f9; flex-shrink: 0; }
.meter-lbl { display: flex; justify-content: space-between; font-size: 10px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
.meter-track { height: 12px; border: 1px solid var(--black); background: var(--white); position: relative; }
.meter-fill { height: 100%; background: var(--black); transition: width 0.3s; }
.meter-target { position: absolute; top: -4px; bottom: -4px; width: 2px; background: var(--indigo); z-index: 2; }

/* ── TRANSCRIPT AREA ── */
.transcript-area { flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column; background: var(--white); }
.transcript-area::-webkit-scrollbar { width: 8px; }
.transcript-area::-webkit-scrollbar-thumb { background: var(--black); }

.log-entry { display: flex; border-bottom: 1px solid var(--black); }
.log-entry.board { background-color: #f6f6f6; }
.log-entry:last-child { border-bottom: none; }
.log-sidebar { width: 150px; padding: 16px; font-family: 'Courier Prime', monospace; font-size: 11px; flex-shrink: 0; border-right: 1px solid var(--black); display: flex; flex-direction: column; justify-content: flex-start; }
.speaker-name { font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
.speaker-time { color: var(--dark-gray); }
.speaker-delta { margin-top: 12px; font-weight: 700; padding-top: 12px; border-top: 1px dotted #ccc; }
.speaker-reason { font-size: 9px; margin-top: 4px; color: var(--dark-gray); line-height: 1.3; }

.log-content { flex: 1; padding: 20px 24px; }
.log-text { font-family: 'Playfair Display', serif; font-size: 16px; line-height: 1.6; color: var(--black); }
.log-text.user { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; }
.typing-cursor { display: inline-block; width: 8px; height: 1em; background: var(--black); vertical-align: middle; margin-left: 2px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* ── INPUT FORM ── */
.input-section { flex-shrink: 0; background: var(--white); }
.input-textarea { width: 100%; border: none; padding: 16px 24px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; resize: none; outline: none; min-height: 80px; }
.input-textarea:focus { background: #fafafa; }
.input-footer { display: flex; justify-content: space-between; align-items: center; padding: 0; background: var(--black); }
.input-info { color: var(--white); font-family: 'Courier Prime', monospace; font-size: 11px; padding: 0 16px; text-transform: uppercase; }
.btn-submit { background: var(--indigo); color: var(--white); border: none; padding: 12px 32px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; border-left: 1px solid var(--black); }
.btn-submit:hover:not(:disabled) { background: #001f7a; }
.btn-submit:disabled { background: #333; color: #888; cursor: not-allowed; }

/* ── COVER SHEET & VERDICT ── */
.cover-sheet { padding: 40px; display: flex; flex-direction: column; justify-content: center; height: 100%; overflow-y: auto; }
.cover-title { font-size: 48px; font-family: 'Playfair Display', serif; font-weight: 600; line-height: 1.1; margin-bottom: 16px; }
.cover-sub { font-size: 14px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; color: var(--indigo); margin-bottom: 48px; }
.dossier-table { width: 100%; border-collapse: collapse; margin-bottom: 48px; font-family: 'Courier Prime', monospace; font-size: 13px; }
.dossier-table td, .dossier-table th { border: 1px solid var(--black); padding: 12px 16px; text-align: left; }
.dossier-table th { background: var(--black); color: var(--white); text-transform: uppercase; width: 140px; font-weight: 700;}
.btn-large { background: var(--black); color: var(--white); padding: 16px 32px; font-size: 14px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; border: none; align-self: flex-start; }
.btn-large:hover { background: var(--indigo); }
.reset-btn { align-self: flex-start; margin-top: 24px; cursor: pointer; font-size: 10px; text-transform: uppercase; font-weight: 700; font-family: 'Courier Prime', monospace; letter-spacing: 0.05em; color: var(--dark-gray); border-bottom: 1px dotted var(--dark-gray); transition: color 0.2s; }
.reset-btn:hover { color: var(--red); border-color: var(--red); }

.verdict-stamp { display: inline-block; font-family: 'Courier Prime', monospace; font-size: 48px; font-weight: 700; text-transform: uppercase; padding: 12px 24px; border: 4px solid; margin-bottom: 32px; transform: rotate(-2deg); }
.verdict-stamp.pass { color: var(--green); border-color: var(--green); }
.verdict-stamp.fail { color: var(--red); border-color: var(--red); }

/* ── MOBILE RESPONSIVENESS ── */
@media (max-width: 768px) {
  #app { padding: 0; }
  .document { max-width: 100%; width: 100%; height: 100%; box-shadow: none; border: none; }
  
  /* Header */
  .doc-header { flex-direction: column; }
  .seal { display: none; }
  .title-area { border-right: none; border-bottom: 1px solid var(--black); padding: 16px; }
  .title-main { font-size: 20px; }
  .meta-area { min-width: 100%; }
  .meta-row { padding: 12px 16px; border-bottom: 1px solid #ddd; }
  .meta-row.b-border { border-bottom: 1px solid #ddd; }

  /* Transcript layout */
  .log-entry { flex-direction: column; }
  .log-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #ccc; padding: 12px 16px; flex-direction: row; align-items: flex-start; justify-content: space-between; }
  .speaker-info-wrap { display: flex; flex-direction: column; }
  .speaker-score-wrap { display: flex; flex-direction: column; align-items: flex-end; text-align: right; }
  .speaker-delta { margin-top: 0; padding-top: 0; border-top: none; }
  .speaker-reason { max-width: 140px; margin-top: 4px; font-size: 9px; }
  .log-content { padding: 16px; }

  /* Input area */
  .input-footer { flex-direction: column; align-items: stretch; }
  .input-info { padding: 12px; text-align: center; border-bottom: 1px solid var(--black); }
  .btn-submit { border-left: none; padding: 16px; }

  /* Modals and Cover */
  .cover-sheet { padding: 24px; justify-content: flex-start; }
  .cover-title { font-size: 32px; margin-top: 16px; }
  .dossier-table, .dossier-table tbody, .dossier-table tr, .dossier-table th, .dossier-table td { display: block; width: 100%; }
  .dossier-table th { padding-bottom: 8px; border-bottom: none; }
  .dossier-table td { border-top: none; }
  .modal-box { padding: 24px; }
  .modal-title { font-size: 18px; }
  .modal-rules { font-size: 13px; }
}

/* ── TAB SWITCH WARNING ── */
.tab-warning-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(209, 31, 31, 0.95);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; color: #fff; text-align: center; padding: 2rem;
}
.tab-warning-title { font-size: 28px; font-weight: 800; text-transform: uppercase; margin-bottom: 16px; }
.tab-warning-msg { font-size: 16px; line-height: 1.6; max-width: 400px; margin-bottom: 24px; }
.tab-warning-count { font-family: 'Courier Prime', monospace; font-size: 14px; opacity: 0.8; }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const e = React.createElement;

const MAX_PROMPTS = 7;
const SESSION_SECS = 25 * 60;
const APPROVAL_THRESHOLD = 62;
const MAX_SCORE = (MAX_PROMPTS - 1) * 15;
const STORAGE_KEY = 'ola_board_session_v1';

const APPROVAL_LINES = ["Recovery plan approved. You demonstrated the rigour this crisis demands.", "The board votes in favour. Quarterly milestones will be ruthlessly tracked.", "Proposal approved. Now execute before the market buries Ola for good."];
const REJECT_LINES = ["This is precisely how tech empires collapse. Rejected.", "Hard pass. Return with numbers, not narratives.", "80,000 complaints a month and this is your recovery plan? Rejected."];

async function callAPI(history, sessionId) {
  const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: history, sessionId }) });
  if (!res.ok) throw new Error("API Error");
  return await res.json(); // { raw, serverScore, serverPct, promptsUsed }
}

function parseBoard(raw) {
  if (!raw || typeof raw !== "string") return null;
  const clean = raw.trim().replace(/^```json\s*/i, "").replace(/^```/, "").replace(/```$/, "").trim();
  try { const p = JSON.parse(clean); if (p.boardResponse) return p; } catch(_) {}
  const start = clean.indexOf("{"), end = clean.lastIndexOf("}");
  if (start !== -1 && end > start) { try { const p = JSON.parse(clean.slice(start, end + 1)); if (p.boardResponse) return p; } catch(_) {} }
  return { boardResponse: clean, convictionDelta: 0, boardMood: "skeptical" }; 
}

const fmtTime = s => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
const signalLabel = d => d > 10 ? "Strong argument — conviction gained" : d > 6 ? "Sound argument" : d > 3 ? "Weak argument — insufficient evidence" : "Unconvincing — no material conviction gained";

function BoardSession() {
  const [initial] = useState(() => {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      if (s) {
        const p = JSON.parse(s);
        // If the user refreshed during a temporary phase, return them to intro to prevent hanging states
        if (["loading", "rules_wait", "rules", "active_loading"].includes(p.phase)) p.phase = "intro";
        return p;
      }
    } catch(e) {}
    return null;
  });

  const [dossierStats, setDossierStats] = useState(initial?.dossierStats || null);
  const [sessionId, setSessionId] = useState(initial?.sessionId || null);

  const [phase, setPhase] = useState(initial?.phase || "intro"); 
  const [messages, setMessages] = useState(initial?.messages || []);
  const [input, setInput] = useState("");
  const [score, setScore] = useState(initial?.score || 0);
  const [promptsLeft, setPromptsLeft] = useState(initial?.promptsLeft ?? MAX_PROMPTS);
  const [timeLeft, setTimeLeft] = useState(initial?.timeLeft ?? SESSION_SECS);
  
  const [thinking, setThinking] = useState(false);
  const [typingText, setTypingText] = useState("");
  const [typingDelta, setTypingDelta] = useState(null);
  const [verdict, setVerdict] = useState(initial?.verdict || null);
  const [tabSwitchCount, setTabSwitchCount] = useState(0);
  const [showTabWarning, setShowTabWarning] = useState(false);
  const [fullscreenExitCount, setFullscreenExitCount] = useState(0);
  const [showFullscreenWarning, setShowFullscreenWarning] = useState(false);

  const historyRef = useRef(initial?.history || []);
  const scoreRef = useRef(0);
  const promptsRef = useRef(MAX_PROMPTS);
  const timers = useRef({ session: null, typing: null });
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  // Synchronize state locally and persistently
  useEffect(() => { scoreRef.current = score; promptsRef.current = promptsLeft; }, [score, promptsLeft]);
  
  useEffect(() => {
    const stateSnapshot = { phase, messages, score, promptsLeft, timeLeft, verdict, dossierStats, sessionId, history: historyRef.current };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stateSnapshot));
  }, [phase, messages, score, promptsLeft, timeLeft, verdict, dossierStats, sessionId]);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, thinking, typingText]);
  useEffect(() => () => { clearInterval(timers.current.session); clearInterval(timers.current.typing); }, []);

  // ── Validate restored session still exists on server ──
  useEffect(() => {
    if (sessionId && (phase === "active" || phase === "ended")) {
      fetch(`/api/session/${sessionId}`).then(r => {
        if (!r.ok) {
          localStorage.removeItem(STORAGE_KEY);
          window.location.reload();
        }
      }).catch(() => {
        localStorage.removeItem(STORAGE_KEY);
        window.location.reload();
      });
    }
  }, []);

  // ── Tab switch / visibility detection ──
  useEffect(() => {
    const handleVisibility = () => {
      if (document.hidden && (phase === "active" || phase === "active_loading")) {
        setTabSwitchCount(c => c + 1);
        setShowTabWarning(true);
      }
    };
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, [phase]);

  // ── Disable right-click context menu during session ──
  useEffect(() => {
    const block = (ev) => { if (phase === 'active') ev.preventDefault(); };
    document.addEventListener('contextmenu', block);
    return () => document.removeEventListener('contextmenu', block);
  }, [phase]);

  const concludeSession = useCallback((finalScore) => {
    clearInterval(timers.current.session);
    clearInterval(timers.current.typing);
    const pct = Math.min(100, Math.round((finalScore / MAX_SCORE) * 100));
    setVerdict({ approved: pct >= APPROVAL_THRESHOLD, line: pct >= APPROVAL_THRESHOLD ? APPROVAL_LINES[0] : REJECT_LINES[0], pct });
    setPhase("ended");
  }, []);

  const startTimer = useCallback(() => {
    clearInterval(timers.current.session);
    timers.current.session = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) { concludeSession(scoreRef.current); return 0; }
        return t - 1;
      });
    }, 1000);
  }, [concludeSession]);

  // Restart timer if browser is reloaded while phase is 'active'
  useEffect(() => {
    if (initial?.phase === "active") startTimer();
  }, [initial, startTimer]);

  // ── Fullscreen exit detection ──
  useEffect(() => {
    const handleFullscreenChange = () => {
      if (!document.fullscreenElement && (phase === "active" || phase === "active_loading")) {
        setFullscreenExitCount(c => {
          const next = c + 1;
          if (next >= 2) {
            concludeSession(0);
          } else {
            setShowFullscreenWarning(true);
          }
          return next;
        });
      }
    };
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
  }, [phase, concludeSession]);

  const animateTyping = useCallback((text, delta, onComplete) => {
    clearInterval(timers.current.typing);
    let i = 0; 
    setTypingText(""); 
    setTypingDelta(delta);
    
    timers.current.typing = setInterval(() => {
      i += 2; 
      if (i > text.length) i = text.length;
      setTypingText(text.slice(0, i));

      bottomRef.current?.scrollIntoView({ behavior: "auto" });

      if (i >= text.length) { 
        clearInterval(timers.current.typing); 
        setTypingText(""); 
        setTypingDelta(null);
        onComplete(text); 
      }
    }, 15);
  }, []);

  const processResponse = useCallback((apiResponse, remainingPrompts) => {
    const parsed = parseBoard(apiResponse.raw);
    if (!parsed) return setThinking(false);

    // Use server-authoritative score and delta
    const serverScore = apiResponse.serverScore || 0;
    setScore(serverScore); scoreRef.current = serverScore;
    const delta = apiResponse.serverDelta != null ? apiResponse.serverDelta : Math.max(0, Math.min(15, parsed.convictionDelta || 0));
    const tz = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    
    animateTyping(parsed.boardResponse, delta, (completedText) => {
      setMessages(p => [...p, { role: "board", text: completedText, delta, time: tz }]);
      // Check if session was terminated by ethics violation
      if (apiResponse.sessionTerminated) {
        setTimeout(() => concludeSession(0), 1500);
      } else if (remainingPrompts <= 0) {
        setTimeout(() => concludeSession(serverScore), 1500);
      } else {
        setTimeout(() => inputRef.current?.focus(), 100);
      }
    });

  }, [animateTyping, concludeSession]);

  const initiateBriefing = () => {
    setPhase("rules_wait");
    setTimeout(() => {
      setPhase("rules");
    }, 1000);
  };

  const AcceptRulesAndConnect = async () => {
    setPhase("active_loading");
    try {
      // Create server session — dossier is generated on the server
      const sessionRes = await fetch("/api/session/create", { method: "POST", headers: { "Content-Type": "application/json" } });
      if (!sessionRes.ok) throw new Error("Failed to create session");
      const { sessionId: newSessionId, dossier } = await sessionRes.json();
      setSessionId(newSessionId);
      setDossierStats(dossier);

      historyRef.current = [{ role: "user", content: "Begin." }];
      const apiResponse = await callAPI(historyRef.current, newSessionId);
      historyRef.current.push({ role: "assistant", content: apiResponse.raw });
      const parsed = parseBoard(apiResponse.raw);
      // Capture opener score from server
      const openerScore = apiResponse.serverScore || 0;
      setScore(openerScore); scoreRef.current = openerScore;
      
      setPhase("active"); 
      startTimer();
      // Request fullscreen
      try { document.documentElement.requestFullscreen?.(); } catch(_) {}
      const textToType = parsed?.boardResponse || "Begin.";
      animateTyping(textToType, null, (completedText) => {
        setMessages([{ role: "board", text: completedText, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]);
        setTimeout(() => inputRef.current?.focus(), 100);
      });
    } catch (e) { alert("Error connecting to server."); setPhase("intro"); }
  };

  const clearRecords = () => {
    if(confirm("Erase all local records and restart?")) {
      localStorage.removeItem(STORAGE_KEY);
      window.location.reload();
    }
  };

  const handleSend = async () => {
    const txt = input.trim();
    if (!txt || thinking || typingText || promptsRef.current <= 0) return;
    setInput(""); setThinking(true);
    
    const newPLeft = promptsRef.current - 1;
    setPromptsLeft(newPLeft); promptsRef.current = newPLeft;
    const tz = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    setMessages(p => [...p, { role: "user", text: txt, time: tz }]);
    
    const snap = [...historyRef.current, { role: "user", content: txt }];
    try {
      const apiResponse = await callAPI(snap, sessionId);
      historyRef.current = [...snap, { role: "assistant", content: apiResponse.raw }];
      setThinking(false);
      processResponse(apiResponse, newPLeft);
    } catch (e) {
      setThinking(false); setPromptsLeft(p => p + 1); setMessages(p => p.slice(0, -1));
    }
  };

  if (phase === "intro") return e("div", {className:"document"},
    e("div", {className:"cover-sheet"},
      e("h1", {className:"cover-title"}, "Recovery Strategy\nBoard Review"),
      e("div", {className:"cover-sub"}, "Confidential Document // Ola Group"),
      e("table", {className:"dossier-table"}, e("tbody", null,
        e("tr", null, e("th", null, "Market Share"), e("td", null, "EV share collapsed from ~56% peak to under 6% — sales down ~85%")),
        e("tr", null, e("th", null, "Valuation"), e("td", null, "Ola Consumer valuation slashed ~83% to $1.25B — duopoly broken")),
        e("tr", null, e("th", null, "Stock Price"), e("td", null, "Post-IPO share price down ~70% from high")),
        e("tr", null, e("th", null, "Leadership"), e("td", null, "~12 senior executives resigned including CTO")),
        e("tr", null, e("th", null, "Service Crisis"), e("td", null, "80,000+ unresolved complaints/month — CCPA crackdown"))
      )),
      e("button", {className:"btn-large", onClick:initiateBriefing}, "Initiate Briefing"),
      initial && e("div", {className:"reset-btn", onClick:clearRecords}, "[ ERASE LOCAL LOGS & RESTART ]")
    )
  );

  if (phase === "ended" && verdict) return e("div", {className:"document"},
    e("div", {className:"cover-sheet"},
      e("div", {className:`verdict-stamp ${verdict.approved?'pass':'fail'}`}, verdict.approved ? "APPROVED" : "REJECTED"),
      e("h1", {className:"cover-title"}, "Final Board Ruling"),
      e("div", {className:"cover-sub", style:{marginBottom:'16px'}}, "Board Advisor: Arjun Mehta"),
      e("p", {style:{fontFamily:"'Playfair Display'", fontSize:'18px', marginBottom:'32px'}}, verdict.line),
      e("div", {style:{fontFamily:"'Courier Prime'", fontSize:'14px'}}, `Final Conviction: ${verdict.pct}% // Threshold: ${APPROVAL_THRESHOLD}%`),
      e("div", {className:"reset-btn", onClick:clearRecords}, "[ ERASE LOCAL LOGS & START NEW SESSION ]")
    )
  );

  const pct = Math.min(100, Math.round((score / MAX_SCORE) * 100));

  return e("div", {className:"document"},
    
    phase === "rules" && e("div", {className:"modal-overlay"},
      e("div", {className:"modal-box"},
        e("div", {className:"modal-title"}, "Rules of Engagement"),
        e("div", {className:"modal-rules"},
          e("p", null, "You are entering a high-stakes board negotiation with Arjun Mehta, Board Advisor to the Ola Group."),
          e("ul", null,
            e("li", null, "You have exactly ", e("strong", null, "25 minutes"), " on the clock."),
            e("li", null, "You are limited to ", e("strong", null, "7 prompts"), ". Make every word count."),
            e("li", null, "Solid arguments grant conviction points. Vague buzzwords grant nothing."),
            e("li", null, "Your goal: Fill the Convince-O-Meter as high as possible before time or prompts run out.")
          ),
          e("p", {style:{fontStyle:'italic', color:'var(--dark-gray)', fontSize:'12px'}}, "Warning: The board may throw unexpected operational curveballs during the meeting.")
        ),
        e("button", {className:"btn-acknowledge", onClick: AcceptRulesAndConnect }, "Acknowledge & Connect")
      )
    ),

    e("div", {className:"doc-header b-border"},
      e("div", {className:"seal r-border"}, "OLA"),
      e("div", {className:"title-area r-border"},
        e("div", {className:"title-main"}, "Hearing Transcript"),
        e("div", {className:"title-sub"}, "Ola Group Board // Strategy Division")
      ),
      e("div", {className:"meta-area"},
        e("div", {className:"meta-row b-border warning"}, e("span", null, "T-MINUS (SEC)"), e("span", null, fmtTime(timeLeft))),
        e("div", {className:"meta-row"}, e("span", null, "PROMPTS REMAINING"), e("span", null, promptsLeft + " / " + MAX_PROMPTS))
      )
    ),
    
    e("div", {className:"meter-container b-border"},
      e("div", {className:"meter-lbl"}, e("span", null, "Board Conviction Status"), e("span", null, pct + "%")),
      e("div", {className:"meter-track"},
        e("div", {className:"meter-fill", style:{width: pct+'%'}})
      )
    ),

    e("div", {className:"transcript-area"},
      messages.map((m,i) => e("div", {key:i, className:`log-entry ${m.role}`},
        
        e("div", {className:"log-sidebar"},
          e("div", {className: "speaker-info-wrap"}, 
             e("div", {className:"speaker-name", style:{color: m.role==='board'?'var(--indigo)':'#000'}}, m.role === 'board' ? 'Arjun Mehta' : 'Presenting Team'),
             e("div", {className:"speaker-time"}, m.time)
          ),
          m.role === 'board' && m.delta !== undefined && m.delta !== null && e("div", {className: "speaker-score-wrap"},
            e("div", {className:"speaker-delta", style:{color:m.delta>0?'var(--green)':'var(--red)'}}, m.delta > 0 ? `+${m.delta} PTS` : '0 PTS'),
            e("div", {className:"speaker-reason"}, signalLabel(m.delta))
          )
        ),

        e("div", {className:"log-content"},
          e("div", {className:`log-text ${m.role}`}, m.text)
        )
      )),
      
      (thinking || phase === "active_loading") && e("div", {className:"log-entry board"},
        e("div", {className:"log-sidebar"}, 
          e("div", {className: "speaker-info-wrap"}, e("div", {className:"speaker-name", style:{color: 'var(--indigo)'}}, "Arjun Mehta"))
        ),
        e("div", {className:"log-content"}, e("div", {className:"log-text", style:{fontStyle:'italic', color:'#888'}}, "[ Establishing connection", e("span", {className:"typing-cursor"}), " ]"))
      ),

      (typingText) && e("div", {className:"log-entry board"},
        e("div", {className:"log-sidebar"}, 
          e("div", {className: "speaker-info-wrap"}, 
             e("div", {className:"speaker-name", style:{color: 'var(--indigo)'}}, "Arjun Mehta")
          ),
          typingDelta !== null && e("div", {className: "speaker-score-wrap"},
            e("div", {className:"speaker-delta", style:{color:typingDelta>0?'var(--green)':'var(--red)'}}, typingDelta > 0 ? `+${typingDelta} PTS` : '0 PTS'),
            e("div", {className:"speaker-reason"}, signalLabel(typingDelta))
          )
        ),
        e("div", {className:"log-content"}, 
          e("div", {className:"log-text"}, typingText, e("span", {className:"typing-cursor"}))
        )
      ),
      e("div", {ref:bottomRef})
    ),

    e("div", {className:"input-section t-border"},
      e("textarea", {
        ref: inputRef,
        className:"input-textarea",
        value: input,
        onChange: e => setInput(e.target.value),
        onKeyDown: e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } },
        onPaste: e => { e.preventDefault(); },
        disabled: thinking || !!typingText || promptsLeft <= 0 || phase !== "active",
        placeholder: promptsLeft <= 0 ? "You have deployed all prompts." : (phase !== "active" ? "Awaiting connection..." : "Type strategy response (paste disabled)...")
      }),
      e("div", {className:"input-footer t-border"},
        e("div", {className:"input-info"}, "ENTER SUBMIT // PASTE DISABLED // NO TAB SWITCHING"),
        e("button", {className:"btn-submit", onClick:handleSend, disabled:!input.trim() || thinking || !!typingText || promptsLeft <= 0 || phase !== "active"}, "Submit to Board")
      )
    ),

    // Tab switch warning overlay
    showTabWarning && e("div", {className: "tab-warning-overlay", onClick: () => { setShowTabWarning(false); try { document.documentElement.requestFullscreen?.(); } catch(_) {} }},
      e("div", {className: "tab-warning-title"}, "⚠ Tab Switch Detected"),
      e("div", {className: "tab-warning-msg"}, "Switching tabs during the board session is not permitted. This has been logged. Please remain in the session window."),
      e("div", {className: "tab-warning-count"}, `Tab violations: ${tabSwitchCount}`),
      e("button", {className: "btn-acknowledge", style: {maxWidth: '300px', marginTop: '16px'}}, "Return to Session")
    ),

    // Fullscreen exit warning overlay
    showFullscreenWarning && e("div", {className: "tab-warning-overlay", onClick: () => { setShowFullscreenWarning(false); try { document.documentElement.requestFullscreen?.(); } catch(_) {} }},
      e("div", {className: "tab-warning-title"}, "⚠ Fullscreen Exit Detected"),
      e("div", {className: "tab-warning-msg"}, "Exiting fullscreen during the board session is not permitted. This is your only warning. A second violation will result in immediate rejection of your proposal."),
      e("div", {className: "tab-warning-count"}, `Fullscreen violations: ${fullscreenExitCount}`),
      e("button", {className: "btn-acknowledge", style: {maxWidth: '300px', marginTop: '16px'}}, "Return to Session")
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(e(BoardSession));
</script>
</body>
</html>
